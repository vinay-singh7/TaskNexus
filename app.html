<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TaskNexus — App</title>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@900,800,700&f[]=satoshi@400,500,700,800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/app.css"/>
<!-- Clerk Auth -->
<script src="js/auth.js"></script>
<script>
  // Block page rendering until auth finishes
  document.documentElement.style.display = 'none';
  window.addEventListener('load', async () => {
    await Auth.initClerk(window.ENV.CLERK_PUBLISHABLE_KEY);
    if (!Auth.requireAuth()) return; // redirects if not logged in
    document.documentElement.style.display = ''; // Show page
    
    // Mount Clerk User Button in Topbar
    const clerk = Auth.getClerk();
    if (clerk && clerk.user) {
      clerk.mountUserButton(document.getElementById('user-button'), {
        afterSignOutUrl: window.location.href.split('app.html')[0] + 'login.html'
      });
    }
    
    // Dispatch an event to signal that Auth is ready for the rest of the tools
    window.dispatchEvent(new Event('auth-ready'));
  });
</script>
<script src="config.js"></script>
<script>
  document.write('<script crossorigin="anonymous" data-clerk-publishable-key="' + window.ENV.CLERK_PUBLISHABLE_KEY + '" src="' + window.ENV.CLERK_JS_URL + '" type="text/javascript"><' + '/script>');
</script>

</head>
